id: ai-invoice-summarizer
name: AI Invoice Summarizer
version: 1.1.0
description: Uses an LLM to summarize an invoice and then requires human approval for a final payment check.

compliance:
  requiresHumanApproval: true
  highRisk: true
  dataClassification: confidential

inputs:
  invoiceRawText: string
  vendorName: string

steps:
  - id: summarize-invoice
    action: flowlite.llm
    description: Generate a concise summary of the invoice using AI.
    compliance:
      requiresHumanApproval: false # The summary itself is low risk
    input:
      prompt: "Summarize the following invoice text: {{inputs.invoiceRawText}}. Focus on individual items and total balance."

  - id: check-compliance
    action: flowlite.validate
    description: Ensure the vendor is on the approved list.
    input:
      vendor: "{{inputs.vendorName}}"

  - id: flag-for-payment
    action: flowlite.log
    description: Final notification before human approval trigger.
    input:
      message: "Invoice summarized and validated. Ready for human authorization."
