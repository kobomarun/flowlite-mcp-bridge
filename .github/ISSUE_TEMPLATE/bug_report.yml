name: Bug Report
description: File a report to help us improve the bridge.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Bridge Version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (Verbose)
      description: Please provide the output of the bridge run with the `--verbose` flag.
      render: JSON
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](CONTRIBUTING.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
